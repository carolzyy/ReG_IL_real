defaults:
  - _self_
  - suite: franka
  - agent: regil_${suite} #regil_meta regil_libero baku #

# Root Dir
root_dir: /home/carol/Project/4-RegIC_IL/ReG_IL_real

# misc
seed: 8
device: cuda
save_video: true
save_train_video: false
video_every_episode: 300
use_tb: true

# experiment
obs_type: "pixels" # pixels, features
num_demos_per_task: 1
encoder_type: 'resnet' # base, resnet
policy_type: 'gpt' # mlp, gpt
policy_head: deterministic # deterministic, gmm, bet, diffusion, vqbet
use_proprio: false
use_language: false
use_actions: false #only for rt1
prompt: text # text, goal, intermediate_goal
eval: true
experiment: train
experiment_label: ${policy_head}

# action chunking
temporal_agg: true # aggregate actions over time
num_queries: 10

# retrieve
retrieve_len: 5
re_history_len: 5
context_len: 50
batch_size: 64 #for baku

# expert dataset
expert_dataset: ${dataloader.bc_dataset}

# Load weights
load_bc: false
bc_weight: null

hydra:
  run:
    dir: ./exp_local/${now:%m.%d}_${experiment}/${agent.name}/${now:%H%M%S} #_${agent.reward_type}
