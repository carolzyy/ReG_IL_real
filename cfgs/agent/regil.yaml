# @package agent
name: regil
_target_: agent.regil.RegAgent
obs_shape: ??? # to be specified later
action_shape: ??? # to be specified later
device: ${device}
lr: 5e-5
hidden_dim: ${suite.hidden_dim}
critic_target_tau: 0.005
stddev_sch: "step_linear(0.3, 0.3,${agent.replay_warmup} , 0.1, 30000)"
stddev_clip: 0.5
use_tb: ${use_tb}
obs_type: ${obs_type}
encoder_type: ${encoder_type}
pixel_keys: ${suite.pixel_keys}
feature_key: ${suite.feature_key}
train_encoder: true
gamma: 0.99
max_episode_len: ${suite.task_make_fn.max_episode_len}

replay_warmup: 2000 #only retrieve agent
bc_weight_schedule: "step_linear(1, 1,${agent.replay_warmup} , 0.0, 4000)" #'linear(0.0,0.9,40000)' ,40000
#debug

pretrain_encoder: true
bc_enable: true # use bc regularization or not
rl_enable: true
reward_type: norm_best_dist  #binary,gt_reward,norm_best_dist,mix
add_expert: true
expert_ratio: 0.3
policy_freq: 2
batch_size: 64 #default for baku for libero

enc_update: 1 #0 frozen, 1 update with actor, 2 update with critic
enc_up_critic: false
bc_type: 'linear' #q_filter,linear
q_filter_act: false

retrieve: true
retrieve_len: ${retrieve_len}
re_history_len: ${re_history_len}

critic_scale: 1
success_scale: 4
lamda: 0
